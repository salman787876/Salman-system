<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartPOS Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, system-ui, Arial;
}

body{
  background:#f5f6f8;
  color:#111;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#111827;
  color:white;
  height:100vh;
  padding:20px;
}

.logo{
  font-weight:700;
  margin-bottom:30px;
  color:#60a5fa;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
  font-size:14px;
  opacity:0.9;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.stats{
  display:flex;
  gap:10px;
}

.stat{
  background:white;
  padding:12px 15px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.05);
  font-size:13px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.price{
  color:#2563eb;
  font-weight:600;
  margin:6px 0;
}

button{
  width:100%;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* CART */
.cart{
  position:fixed;
  right:20px;
  top:20px;
  width:260px;
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.item{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  border-bottom:1px solid #eee;
  padding:6px 0;
}

.total{
  margin-top:10px;
  font-weight:700;
  color:#2563eb;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🏪 SmartPOS</div>
<div class="menu">
<div>Dashboard</div>
<div>Products</div>
<div>Sales</div>
<div>Settings</div>
</div>
</div>

<div class="main">

<div class="topbar">
<h2>Products</h2>
<div class="stats">
<div class="stat">💰 Today: 0 SAR</div>
<div class="stat">🧾 Orders: 0</div>
</div>
</div>

<div class="grid" id="products"></div>

</div>

<div class="cart">
<h3>Cart</h3>
<div id="cart"></div>
<div class="total">Total: <span id="total">0</span></div>
</div>

<script>

let products=[
{name:"Milk",price:5},
{name:"Bread",price:3},
{name:"Eggs",price:12},
{name:"Rice",price:20},
{name:"Apple",price:8},
{name:"Juice",price:6}
];

let cart=[];

function render(){
let div=document.getElementById("products");
div.innerHTML="";

products.forEach((p,i)=>{
div.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<div class="price">${p.price} SAR</div>
<button onclick="add(${i})">Add</button>
</div>`;
});

renderCart();
}

function add(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let div=document.getElementById("cart");
div.innerHTML="";
let total=0;

cart.forEach(c=>{
total+=c.price;
div.innerHTML+=`
<div class="item">
<span>${c.name}</span>
<span>${c.price}</span>
</div>`;
});

document.getElementById("total").innerText=total;
}

render();

</script>

</body>
</html>
