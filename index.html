<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grocery Store</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: orange;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      background: orange;
      border: none;
      padding: 8px;
      margin-top: 8px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }

    .cart {
      margin-top: 30px;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
      border-bottom: 1px solid #333;
      padding: 5px;
    }

    .total {
      margin-top: 10px;
      font-size: 20px;
      color: lightgreen;
    }
  </style>
</head>

<body>

<h1>🏪 Grocery Store System</h1>

<div class="products" id="products"></div>

<div class="cart">
  <h2>🛒 Cart</h2>
  <div id="cart"></div>
  <div class="total">Total: <span id="total">0</span> SAR</div>
</div>

<script>
const products = [
  { name: "Milk", price: 5, img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400" },
  { name: "Bread", price: 3, img: "https://images.unsplash.com/photo-1608198093002-ad4e005484ec?w=400" },
  { name: "Eggs", price: 12, img: "https://images.unsplash.com/photo-1506976785307-8732e854ad03?w=400" },
  { name: "Rice", price: 20, img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=400" },
  { name: "Apple", price: 8, img: "https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=400" },
  { name: "Juice", price: 6, img: "https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=400" }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderProducts() {
  const div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach((p, i) => {
    div.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} SAR</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(index) {
  cart.push(products[index]);
  save();
  renderCart();
}

function removeItem(i) {
  cart.splice(i, 1);
  save();
  renderCart();
}

function save() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart() {
  const div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((c, i) => {
    total += c.price;

    div.innerHTML += `
      <div class="item">
        <span>${c.name}</span>
        <span>${c.price} SAR</span>
        <button onclick="removeItem(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

renderProducts();
renderCart();
</script>

</body>
</html>
