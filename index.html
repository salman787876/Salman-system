<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartPOS Pro</title>

<style>
*{
  margin:0;
  padding:0;
  font-family:system-ui;
  box-sizing:border-box;
}

body{
  background:linear-gradient(120deg,#eef1f6,#f7f8fa);
  color:#111;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  width:280px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ddd;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.orange{background:#ff7a00;color:black;}
.gray{background:#111;color:white;}

/* APP */
.app{
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background:#1c1c1f;
  color:white;
  padding:20px;
}

.sidebar h3{
  color:#ff7a00;
  margin-bottom:20px;
}

.menu div{
  margin:10px 0;
  font-size:14px;
  opacity:0.8;
  cursor:pointer;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:white;
  padding:12px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.price{
  color:#ff7a00;
  font-weight:700;
}

.add{
  background:#ff7a00;
  color:black;
}

/* CART */
.cart{
  position:fixed;
  right:20px;
  top:20px;
  width:260px;
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.item{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
  padding:5px 0;
}

.total{
  margin-top:10px;
  color:#ff7a00;
  font-weight:700;
}

/* LOGIN ERROR */
.err{
  color:red;
  font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <h3>SmartPOS Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <div class="err" id="err"></div>
    <button class="gray" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="sidebar">
<h3>🏪 SmartPOS</h3>
<div class="menu">
<div onclick="show('pos')">POS</div>
<div onclick="show('reports')">Reports</div>
<div onclick="logout()">Logout</div>
</div>
</div>

<div class="main">

<h2 id="title">POS System</h2>

<div class="grid" id="products"></div>

</div>

<div class="cart">
<h3>Cart</h3>
<div id="cart"></div>
<div class="total">Total: <span id="total">0</span></div>
<button class="orange" onclick="checkout()">Checkout & Print</button>
</div>

</div>

<script>

let users={
"salman":{pass:"1234",role:"admin"},
"thnayan":{pass:"1234",role:"cashier"}
};

let currentUser=null;

let products=[
{name:"Milk",price:5},
{name:"Bread",price:3},
{name:"Eggs",price:12},
{name:"Rice",price:20},
{name:"Apple",price:8},
{name:"Juice",price:6}
];

let cart=[];
let logs=[];

/* LOGIN */
function login(){
let u=user.value;
let p=pass.value;

if(users[u] && users[u].pass===p){
currentUser={name:u,role:users[u].role};
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
}else{
err.innerText="Invalid login";
}
}

/* RENDER */
function render(){
let div=document.getElementById("products");
div.innerHTML="";

products.forEach((p,i)=>{
div.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<div class="price">${p.price} SAR</div>
<button class="add" onclick="add(${i})">Add</button>
</div>`;
});

renderCart();
}

/* ADD */
function add(i){
cart.push(products[i]);
renderCart();
}

/* CART */
function renderCart(){
let div=document.getElementById("cart");
div.innerHTML="";
let total=0;

cart.forEach(c=>{
total+=c.price;
div.innerHTML+=`
<div class="item">
<span>${c.name}</span>
<span>${c.price}</span>
</div>`;
});

document.getElementById("total").innerText=total;
}

/* CHECKOUT + INVOICE */
function checkout(){
let total=document.getElementById("total").innerText;

let invoice={
user:currentUser.name,
role:currentUser.role,
items:[...cart],
total:Number(total),
time:new Date().toLocaleString()
};

logs.push(invoice);

let win=window.open("");
win.document.write(`
<h2>🧾 SmartPOS Invoice</h2>
<p>User: ${invoice.user}</p>
<p>Time: ${invoice.time}</p>
<hr>
${cart.map(c=>`<p>${c.name} - ${c.price}</p>`).join("")}
<hr>
<h3>Total: ${total} SAR</h3>
`);

win.print();

cart=[];
renderCart();
}

/* NAV */
function show(page){
alert("Demo section: " + page);
}

/* LOGOUT */
function logout(){
location.reload();
}

</script>

</body>
</html>
