<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Market System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0e0e0e;
  color:white;
}

header{
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid orange;
}

h1{color:orange;margin:0;}

button{
  cursor:pointer;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  font-weight:bold;
}

.orange{background:orange;}
.red{background:#ff4d4d;color:white;}
.green{background:#3ddc84;}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.products{
  flex:3;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:#1a1a1a;
  border-radius:10px;
  padding:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.cart{
  flex:1;
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  height:fit-content;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
  border-bottom:1px solid #333;
  padding:5px;
}

input{
  padding:8px;
  margin:5px 0;
  width:90%;
}

.admin-panel{
  display:none;
  padding:20px;
  background:#151515;
  border-top:2px solid orange;
}
</style>
</head>

<body>

<header>
<h1>🏪 Super Market</h1>

<div>
<button class="orange" onclick="toggleAdmin()">Admin</button>
<button class="red" onclick="logoutAdmin()">Logout</button>
</div>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<h3>Total: <span id="total">0</span> SAR</h3>
<button class="green" onclick="checkout()">Checkout</button>
</div>

</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="admin">

<h2>🧑‍💼 Admin Panel</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" type="number" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<button class="green" onclick="addProduct()">Add Product</button>

<h3>Products List</h3>
<div id="adminList"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Milk", price:5, img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400"},
  {name:"Bread", price:3, img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec?w=400"},
  {name:"Eggs", price:12, img:"https://images.unsplash.com/photo-1506976785307-8732e854ad03?w=400"},
  {name:"Apple", price:8, img:"https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=400"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let isAdmin = false;

function save(){
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* PRODUCTS */
function renderProducts(){
  let div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} SAR</p>
        <button class="orange" onclick="addToCart(${i})">Add</button>
      </div>
    `;
  });

  renderAdmin();
}

/* CART */
function addToCart(i){
  cart.push(products[i]);
  save();
  renderCart();
}

function removeItem(i){
  cart.splice(i,1);
  save();
  renderCart();
}

function renderCart(){
  let div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((c,i)=>{
    total += c.price;

    div.innerHTML += `
      <div class="item">
        <span>${c.name}</span>
        <span>${c.price}</span>
        <button class="red" onclick="removeItem(${i})">X</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* CHECKOUT */
function checkout(){
  alert("Payment Successful 💰 Total: " + document.getElementById("total").innerText + " SAR");
  cart = [];
  save();
  renderCart();
}

/* ADMIN */
function toggleAdmin(){
  let pass = prompt("Enter Admin Password:");
  if(pass === "1234"){
    isAdmin = true;
    document.getElementById("admin").style.display = "block";
  }else{
    alert("Wrong Password");
  }
}

function logoutAdmin(){
  isAdmin = false;
  document.getElementById("admin").style.display = "none";
}

function addProduct(){
  let name = document.getElementById("pname").value;
  let price = document.getElementById("pprice").value;
  let img = document.getElementById("pimg").value;

  if(!name || !price || !img) return;

  products.push({name, price:Number(price), img});

  save();
  renderProducts();
}

/* ADMIN LIST */
function renderAdmin(){
  let div = document.getElementById("adminList");
  if(!div) return;
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="item">
        <span>${p.name}</span>
        <button class="red" onclick="deleteProduct(${i})">Delete</button>
      </div>
    `;
  });
}

function deleteProduct(i){
  products.splice(i,1);
  save();
  renderProducts();
}

renderProducts();
renderCart();

</script>

</body>
</html>
