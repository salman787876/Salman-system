<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام البقالة المتكامل - بقالتي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');
        * { font-family: 'Cairo', system-ui, sans-serif; }
        .sidebar { transition: all 0.3s; }
        .page { display: none; }
        .page.active { display: block; }
        .receipt { width: 300px; font-size: 12px; border: 2px dashed #000; padding: 15px; margin: 0 auto; }
        table { border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; }
    </style>
</head>
<body class="bg-gray-950 text-white">

    <!-- صفحة تسجيل الدخول -->
    <div id="login-page" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-50">
        <div class="bg-gray-900 p-10 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <i class="fa-solid fa-store text-6xl text-emerald-500 mb-4"></i>
                <h1 class="text-3xl font-bold">بقالتي</h1>
                <p class="text-gray-400 mt-2">نظام البقالة المتكامل</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">اسم المستخدم</label>
                    <input id="username" type="text" placeholder="مثال: salman" 
                           class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">كلمة المرور</label>
                    <input id="password" type="password" placeholder="••••••••" 
                           class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500">
                </div>
                <button onclick="login()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-3xl font-bold text-lg transition">
                    تسجيل الدخول
                </button>
            </div>
            
            <div class="mt-8 text-center text-xs text-gray-500">
                <p>المدير: <strong>salman</strong> / 1234</p>
                <p>الكاشير: <strong>azoz</strong> / 1234</p>
            </div>
        </div>
    </div>

    <!-- النظام الرئيسي (نفس التصميم الأصلي تماماً) -->
    <div id="main-app" class="hidden flex h-screen flex-col">

        <!-- الشريط العلوي -->
        <div class="bg-emerald-700 text-white px-6 py-4 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-store text-3xl"></i>
                <div>
                    <h1 class="text-2xl font-bold">بقالتي</h1>
                    <p class="text-xs opacity-75">نظام البقالة المتكامل</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-sm">
                    <span id="current-date" class="font-medium"></span>
                </div>
                <div onclick="logout()" class="flex items-center gap-2 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-xl cursor-pointer transition">
                    <i class="fa-solid fa-user"></i>
                    <span id="user-name" class="font-medium"></span>
                    <i class="fa-solid fa-right-from-bracket"></i>
                </div>
            </div>
        </div>

        <div class="flex h-[calc(100vh-65px)]">

            <!-- القائمة الجانبية -->
            <div class="sidebar w-72 bg-gray-900 p-4 flex flex-col border-l border-gray-700">
                <div onclick="showPage('dashboard')" class="nav-item flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-emerald-600 cursor-pointer mb-1 active">
                    <i class="fa-solid fa-gauge-high w-6"></i>
                    <span class="font-semibold">لوحة التحكم</span>
                </div>
                <div onclick="showPage('products')" class="nav-item flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-emerald-600 cursor-pointer mb-1">
                    <i class="fa-solid fa-boxes-stacked w-6"></i>
                    <span class="font-semibold">المنتجات</span>
                </div>
                <div onclick="showPage('customers')" class="nav-item flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-emerald-600 cursor-pointer mb-1">
                    <i class="fa-solid fa-users w-6"></i>
                    <span class="font-semibold">المواطنين / العملاء</span>
                </div>
                <div onclick="showPage('pos')" class="nav-item flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-emerald-600 cursor-pointer mb-1">
                    <i class="fa-solid fa-cash-register w-6"></i>
                    <span class="font-semibold">نقطة البيع (POS)</span>
                </div>
                <div onclick="showPage('reports')" class="nav-item flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-emerald-600 cursor-pointer mb-1">
                    <i class="fa-solid fa-chart-bar w-6"></i>
                    <span class="font-semibold">التقارير اليومية</span>
                </div>
                <div onclick="showPage('invoices')" class="nav-item flex items-center gap-3 px-4 py-4 rounded-2xl hover:bg-emerald-600 cursor-pointer mb-1">
                    <i class="fa-solid fa-file-invoice w-6"></i>
                    <span class="font-semibold">الفواتير والطباعة</span>
                </div>

                <div class="mt-auto pt-6 border-t border-gray-700">
                    <div class="text-xs text-gray-400 px-4 mb-2">إعدادات إضافية</div>
                    <div onclick="showPage('settings')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-emerald-600 cursor-pointer text-sm">
                        <i class="fa-solid fa-cog w-5"></i>
                        <span>الإعدادات العامة</span>
                    </div>
                    <div onclick="clearAllData()" class="text-red-400 text-sm flex items-center gap-2 px-4 py-3 hover:bg-red-900/30 rounded-2xl cursor-pointer mt-1">
                        <i class="fa-solid fa-trash"></i>
                        <span>مسح جميع البيانات</span>
                    </div>
                </div>
            </div>

            <!-- المحتوى الرئيسي (نفس الكود الأصلي) -->
            <div class="flex-1 overflow-auto bg-gray-950 p-8" id="main-content">
                <!-- جميع الصفحات هنا كما هي في الكود الأصلي الذي أرسلته -->
                <!-- للاختصار، يمكنك لصق باقي المحتوى من الكود الأصلي (dashboard, products, customers, pos, reports, invoices, settings) -->

                <div id="dashboard" class="page active">
                    <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><i class="fa-solid fa-gauge-high"></i> لوحة التحكم</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="bg-gradient-to-br from-emerald-600 to-teal-700 p-6 rounded-3xl">
                            <p class="text-emerald-100 text-sm">إجمالي المبيعات اليوم</p>
                            <p id="today-sales" class="text-4xl font-bold mt-2">0 ر.س</p>
                        </div>
                        <!-- باقي الكروت كما هي في الكود الأصلي -->
                    </div>
                </div>

                <!-- باقي الصفحات (products, pos, customers, reports, invoices, settings) -->
                <!-- انسخها من الكود الأصلي الذي أرسلته في البداية -->

            </div>
        </div>
    </div>

    <!-- Modals و فاتورة الطباعة (نفسها من الكود الأصلي) -->
    <!-- يمكنك لصقها من الكود الأصلي -->

    <script>
        // ==================== بيانات المستخدمين ====================
        const USERS = [
            { id: 1, username: "salman", password: "1234", name: "سلمان", role: "manager", position: "المدير" },
            { id: 2, username: "azoz", password: "1234", name: "عزوز", role: "cashier", position: "كاشير" }
        ];

        let currentUser = null;

        // ==================== البيانات (نفس الكود الأصلي) ====================
        let DATA = {
            products: [
                { id: 1, name: "أرز بسمتي 5 كجم", price: 28, stock: 45 },
                { id: 2, name: "سكر أبيض 2 كجم", price: 12, stock: 120 },
                { id: 3, name: "زيت ذرة 1.5 لتر", price: 18, stock: 67 },
                { id: 4, name: "حليب طازج 1 لتر", price: 7, stock: 89 },
                { id: 5, name: "بيض 30 بيضة", price: 22, stock: 34 },
                { id: 6, name: "خبز عربي 10 حبات", price: 5, stock: 200 }
            ],
            customers: [
                { id: 1, name: "أحمد محمد العتيبي", phone: "0551234567", points: 245, date: "2026-04-10" },
                { id: 2, name: "سارة خالد الشهري", phone: "0509876543", points: 120, date: "2026-04-12" },
                { id: 3, name: "عبدالله الدوسري", phone: "0565558888", points: 310, date: "2026-04-14" }
            ],
            transactions: []
        };

        function loadData() {
            const saved = localStorage.getItem('bqaalaSystemData');
            if (saved) DATA = JSON.parse(saved);
            renderAll();
        }

        function saveData() {
            localStorage.setItem('bqaalaSystemData', JSON.stringify(DATA));
        }

        function clearAllData() {
            if (confirm('هل أنت متأكد من مسح كل البيانات؟')) {
                localStorage.removeItem('bqaalaSystemData');
                location.reload();
            }
        }

        // ==================== تسجيل الدخول ====================
        function login() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            const user = USERS.find(u => u.username === username && u.password === password);

            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                document.getElementById('user-name').textContent = user.name;
                document.getElementById('current-date').innerHTML = `اليوم: ${new Date().toLocaleDateString('ar-SA')}`;
                
                initializeSystem();
            } else {
                alert('اسم المستخدم أو كلمة المرور غير صحيحة!');
            }
        }

        function logout() {
            if (confirm('تسجيل الخروج؟')) {
                localStorage.removeItem('currentUser');
                location.reload();
            }
        }

        // ==================== باقي الدوال (نفس الكود الأصلي) ====================
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            
            if (page === 'products') renderProducts();
            if (page === 'customers') renderCustomers();
            if (page === 'reports') renderDailyReport();
            if (page === 'invoices') renderAllInvoices();
            if (page === 'dashboard') renderDashboard();
        }

        function renderAll() {
            renderDashboard();
            renderProducts();
            renderCustomers();
        }

        // باقي الدوال (renderDashboard, renderProducts, renderCustomers, POS, checkout, printReceipt, إلخ)
        // انسخها من الكود الأصلي الذي أرسلته في البداية

        function initializeSystem() {
            loadData();
            console.log('%c✅ نظام بقالتي جاهز مع نظام تسجيل الدخول!', 'color:#10b981; font-size:16px;');
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-name').textContent = currentUser.name;
                initializeSystem();
            }
        };
    </script>
</body>
</html>
