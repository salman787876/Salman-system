<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartPOS Pro</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f4f7ff;
}

/* HEADER */
header{
  background:#1e66ff;
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header button{
  margin-left:8px;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:2.5fr 1fr;
  gap:15px;
  padding:15px;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.card{
  background:white;
  padding:12px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.card h3{margin:0;}

.price{
  color:#1e66ff;
  font-weight:bold;
  margin:5px 0;
}

button{
  cursor:pointer;
}

.add{
  width:100%;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#1e66ff;
  color:white;
}

/* CART */
.cart{
  background:white;
  padding:12px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
  height:fit-content;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #eee;
}

.total{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
  color:#1e66ff;
}

.small{
  font-size:12px;
  color:gray;
}

/* SETTINGS */
.settings{
  margin:15px;
  background:white;
  padding:12px;
  border-radius:14px;
}
</style>
</head>

<body>

<header>
<div id="title">🏪 SmartPOS Pro</div>

<div>
<button onclick="toggleLang()">🌍</button>
<button onclick="printReceipt()">🧾</button>
</div>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h3 id="cartTitle">🛒 Cart</h3>
<div id="cart"></div>
<div class="total">Total: <span id="total">0</span></div>

<button class="add" onclick="checkout()">Checkout</button>
<div class="small" id="sales"></div>
</div>

</div>

<!-- SETTINGS -->
<div class="settings">
<h3 id="settingsTitle">⚙️ Settings</h3>

<input id="name" placeholder="Product name">
<input id="price" type="number" placeholder="Price">
<button class="add" onclick="addProduct()">Add</button>
</div>

<script>

let lang = localStorage.getItem("lang") || "en";

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Milk", price:5},
  {name:"Bread", price:3},
  {name:"Eggs", price:12},
  {name:"Rice", price:20},
  {name:"Apple", price:8}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];

/* SAVE */
function save(){
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("sales", JSON.stringify(sales));
}

/* LANGUAGE */
function toggleLang(){
  lang = lang === "en" ? "ar" : "en";
  localStorage.setItem("lang", lang);
  render();
}

/* TRANSLATE */
function t(en, ar){
  return lang === "en" ? en : ar;
}

/* PRODUCTS */
function render(){
  let div = document.getElementById("products");
  div.innerHTML = "";

  document.getElementById("cartTitle").innerText = t("Cart", "السلة");
  document.getElementById("settingsTitle").innerText = t("Settings", "الإعدادات");

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <div class="price">${p.price} SAR</div>
        <button class="add" onclick="add(${i})">${t("Add", "إضافة")}</button>
      </div>
    `;
  });

  renderCart();
  renderSales();
}

/* ADD CART */
function add(i){
  cart.push(products[i]);
  save();
  renderCart();
}

/* CART */
function renderCart(){
  let div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((c)=>{
    total += c.price;

    div.innerHTML += `
      <div class="item">
        <span>${c.name}</span>
        <span>${c.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* CHECKOUT */
function checkout(){
  let total = document.getElementById("total").innerText;

  let sale = {
    items:[...cart],
    total:Number(total),
    date:new Date().toLocaleString()
  };

  sales.push(sale);
  cart = [];

  save();
  renderCart();
  renderSales();
}

/* SALES REPORT */
function renderSales(){
  let div = document.getElementById("sales");

  let todayTotal = sales.reduce((sum,s)=>sum + s.total,0);

  div.innerHTML = `
    <hr>
    <div>📊 ${t("Daily Sales", "مبيعات اليوم")}: ${todayTotal} SAR</div>
    <div class="small">${sales.length} transactions</div>
  `;
}

/* PRINT RECEIPT */
function printReceipt(){
  let total = document.getElementById("total").innerText;

  let win = window.open("");
  win.document.write(`
    <h2>🧾 SmartPOS Receipt</h2>
    <p>Date: ${new Date().toLocaleString()}</p>
    <hr>
    ${cart.map(c=>`<p>${c.name} - ${c.price}</p>`).join("")}
    <hr>
    <h3>Total: ${total} SAR</h3>
  `);
  win.print();
}

/* ADD PRODUCT */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;

  if(!name || !price) return;

  products.push({name, price:Number(price)});
  save();
  render();
}

render();

</script>

</body>
</html>
