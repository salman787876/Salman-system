<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart POS System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, Arial;
}

body{
  background:#f6f9ff;
  color:#111;
}

/* HEADER */
header{
  background:white;
  padding:18px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #e8eefc;
  position:sticky;
  top:0;
}

.logo{
  font-size:18px;
  font-weight:700;
  color:#1e66ff;
}

/* LAYOUT */
.wrapper{
  display:grid;
  grid-template-columns: 2.5fr 1fr;
  gap:20px;
  padding:20px;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

/* PRODUCT CARD */
.card{
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 4px 18px rgba(30,102,255,0.08);
  border:1px solid #eef3ff;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 25px rgba(30,102,255,0.15);
}

.card h3{
  margin-bottom:5px;
}

.price{
  color:#1e66ff;
  font-weight:700;
  margin-bottom:10px;
}

.stock{
  font-size:13px;
  color:#666;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.btn{
  background:#1e66ff;
  color:white;
}

.btn:hover{
  background:#0f55e6;
}

/* CART */
.cart{
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 4px 18px rgba(0,0,0,0.06);
  height:fit-content;
  position:sticky;
  top:90px;
}

.cart h2{
  margin-bottom:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.total{
  margin-top:15px;
  font-size:18px;
  font-weight:700;
  color:#1e66ff;
}

/* ADMIN */
.admin{
  margin:20px;
  background:white;
  padding:15px;
  border-radius:14px;
  box-shadow:0 4px 18px rgba(0,0,0,0.05);
}

input{
  padding:10px;
  margin:5px;
  border:1px solid #ddd;
  border-radius:10px;
}

.small{
  width:150px;
}

.admin button{
  width:auto;
  background:#1e66ff;
  color:white;
}
</style>
</head>

<body>

<header>
<div class="logo">🏪 Smart POS System</div>
</header>

<div class="wrapper">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h2>🛒 Cart</h2>
<div id="cart"></div>

<div class="total">
Total: <span id="total">0</span> SAR
</div>

<button class="btn" onclick="checkout()">Checkout</button>
</div>

</div>

<!-- ADMIN -->
<div class="admin">
<h3>➕ Admin Panel</h3>

<input id="name" placeholder="Product name">
<input id="price" class="small" type="number" placeholder="Price">
<input id="stock" class="small" type="number" placeholder="Stock">

<button onclick="addProduct()">Add Product</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Milk", price:5, stock:12},
  {name:"Bread", price:3, stock:20},
  {name:"Eggs", price:12, stock:15},
  {name:"Rice 1kg", price:18, stock:10},
  {name:"Apple", price:8, stock:25},
  {name:"Juice", price:6, stock:18}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* PRODUCTS */
function render(){
  let div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <div class="price">${p.price} SAR</div>
        <div class="stock">Stock: ${p.stock}</div>
        <button class="btn" onclick="add(${i})">Add to Cart</button>
      </div>
    `;
  });

  renderCart();
}

/* ADD */
function add(i){
  if(products[i].stock <= 0) return alert("Out of stock");

  products[i].stock--;
  cart.push(products[i]);

  save();
  render();
}

/* CART */
function renderCart(){
  let div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((c)=>{
    total += c.price;

    div.innerHTML += `
      <div class="item">
        <span>${c.name}</span>
        <span>${c.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* CHECKOUT */
function checkout(){
  alert("Payment Successful 💳 Total: " + document.getElementById("total").innerText);
  cart = [];
  save();
  render();
}

/* ADMIN */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let stock = document.getElementById("stock").value;

  if(!name || !price || !stock) return;

  products.push({
    name,
    price:Number(price),
    stock:Number(stock)
  });

  save();
  render();
}

render();

</script>

</body>
</html>
