<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Supermarket POS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f8ff;
  color:#1a1a1a;
}

/* HEADER */
header{
  background:#1e66ff;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  margin:0;
  font-size:20px;
}

/* LAYOUT */
.container{
  display:flex;
  gap:15px;
  padding:15px;
}

/* PRODUCTS */
.products{
  flex:3;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:white;
  border-radius:10px;
  padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card h3{
  margin:5px 0;
}

.price{
  color:#1e66ff;
  font-weight:bold;
}

button{
  background:#1e66ff;
  color:white;
  border:none;
  padding:8px;
  width:100%;
  border-radius:6px;
  cursor:pointer;
}

/* CART */
.cart{
  flex:1;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  height:fit-content;
}

.item{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
  padding:5px 0;
}

.total{
  font-size:18px;
  margin-top:10px;
  color:#1e66ff;
}

/* ADMIN */
.admin{
  margin:15px;
  padding:15px;
  background:white;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input{
  padding:8px;
  margin:5px;
  width:200px;
}
</style>
</head>

<body>

<header>
<h1>🏪 Smart Supermarket POS</h1>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cart"></div>
<div class="total">Total: <span id="total">0</span> SAR</div>
<button onclick="checkout()">Checkout</button>
</div>

</div>

<!-- ADMIN -->
<div class="admin">
<h3>➕ Add Product (Admin)</h3>

<input id="name" placeholder="Product name">
<input id="price" type="number" placeholder="Price">
<input id="qty" type="number" placeholder="Qty">

<button onclick="addProduct()">Add Product</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Milk", price:5, qty:10},
  {name:"Bread", price:3, qty:15},
  {name:"Eggs", price:12, qty:20},
  {name:"Rice", price:20, qty:8},
  {name:"Apple", price:8, qty:25},
  {name:"Juice", price:6, qty:18}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SAVE */
function save(){
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* RENDER PRODUCTS */
function renderProducts(){
  let div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p class="price">${p.price} SAR</p>
        <p>Stock: ${p.qty}</p>
        <button onclick="addToCart(${i})">Add</button>
      </div>
    `;
  });
}

/* ADD TO CART */
function addToCart(i){
  if(products[i].qty <= 0) return alert("Out of stock!");

  products[i].qty--;
  cart.push(products[i]);

  save();
  renderProducts();
  renderCart();
}

/* CART */
function renderCart(){
  let div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((c,i)=>{
    total += c.price;

    div.innerHTML += `
      <div class="item">
        <span>${c.name}</span>
        <span>${c.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* CHECKOUT */
function checkout(){
  alert("Payment Done 💙 Total: " + document.getElementById("total").innerText);
  cart = [];
  save();
  renderCart();
}

/* ADMIN ADD */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let qty = document.getElementById("qty").value;

  if(!name || !price || !qty) return;

  products.push({
    name,
    price:Number(price),
    qty:Number(qty)
  });

  save();
  renderProducts();
}

renderProducts();
renderCart();

</script>

</body>
</html>
