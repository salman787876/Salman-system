<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartPOS System</title>

<style>
*{
  margin:0;
  padding:0;
  font-family:system-ui;
  box-sizing:border-box;
}

body{
  background:#f5f8ff;
}

/* HEADER */
header{
  background:#1e66ff;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  font-size:18px;
}

/* LAYOUT */
.wrapper{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
}

.price{
  color:#1e66ff;
  font-weight:bold;
  margin:5px 0;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.add{
  background:#1e66ff;
  color:white;
}

.add:hover{
  background:#0f55e6;
}

/* CART */
.cart{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  height:fit-content;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.total{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
  color:#1e66ff;
}

/* ADMIN */
.admin{
  margin:20px;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input{
  padding:10px;
  margin:5px;
  border:1px solid #ddd;
  border-radius:8px;
}
</style>

</head>

<body>

<header>
<h1>🏪 SmartPOS System</h1>
</header>

<div class="wrapper">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cart"></div>
<div class="total">Total: <span id="total">0</span> SAR</div>
<button onclick="checkout()" class="add">Checkout</button>
</div>

</div>

<!-- ADMIN -->
<div class="admin">
<h3>➕ Add Product</h3>
<input id="name" placeholder="Product name">
<input id="price" type="number" placeholder="Price">
<button onclick="addProduct()" class="add">Add</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Milk", price:5},
  {name:"Bread", price:3},
  {name:"Eggs", price:12},
  {name:"Rice", price:20},
  {name:"Apple", price:8},
  {name:"Juice", price:6}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SAVE */
function save(){
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* PRODUCTS */
function render(){
  let div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <div class="price">${p.price} SAR</div>
        <button class="add" onclick="add(${i})">Add</button>
      </div>
    `;
  });

  renderCart();
}

/* ADD TO CART */
function add(i){
  cart.push(products[i]);
  save();
  renderCart();
}

/* CART */
function renderCart(){
  let div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((c,i)=>{
    total += c.price;

    div.innerHTML += `
      <div class="item">
        <span>${c.name}</span>
        <span>${c.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* CHECKOUT */
function checkout(){
  alert("Paid 💰 Total: " + document.getElementById("total").innerText);
  cart = [];
  save();
  renderCart();
}

/* ADD PRODUCT */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;

  if(!name || !price) return;

  products.push({name, price:Number(price)});
  save();
  render();
}

render();

</script>

</body>
</html>
