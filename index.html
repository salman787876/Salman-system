<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سمارت إيرا - SmartEra | منصة المدرسة الذكية الشاملة v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap');
        * { font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0a0f1c 0%, #1a2338 100%); }
        .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.12); }
        .nav-active { background: linear-gradient(90deg, #22d3ee, #3b82f6); color: white; box-shadow: 0 10px 15px -3px rgb(34 211 238 / 0.3); }
        .card-hover { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .card-hover:hover { transform: scale(1.04) translateY(-8px); }
        .modal-pop { animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.75) translateY(60px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .status-dot { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- شاشة الدخول - مستوحاة من Classera -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,#1e40af_0%,transparent_70%)]">
        <div class="glass rounded-3xl max-w-2xl w-full p-16 shadow-2xl">
            <div class="flex justify-center mb-10">
                <div class="flex items-center gap-4">
                    <div class="w-20 h-20 bg-gradient-to-br from-cyan-400 via-blue-500 to-purple-600 rounded-3xl flex items-center justify-center text-6xl shadow-xl">🏛️</div>
                    <div>
                        <h1 class="text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-400">سمارت إيرا</h1>
                        <p class="text-cyan-300 text-2xl -mt-2">SmartEra</p>
                    </div>
                </div>
            </div>
            <p class="text-center text-slate-300 text-xl mb-12">منصة تعليمية ذكية شاملة • مستوحاة من Classera</p>

            <form id="login-form" class="space-y-8">
                <div>
                    <label class="block text-sm font-medium mb-3">اسم المستخدم أو البريد</label>
                    <input id="username" type="text" required class="w-full glass border border-white/30 focus:border-cyan-400 rounded-3xl py-7 px-8 text-xl" placeholder="طالب1 أو استاذ1">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-3">كلمة المرور</label>
                    <input id="password" type="password" value="123" required class="w-full glass border border-white/30 focus:border-cyan-400 rounded-3xl py-7 px-8 text-xl">
                </div>
                <button type="submit" class="w-full py-7 text-2xl font-bold bg-gradient-to-r from-cyan-500 via-blue-600 to-purple-600 rounded-3xl hover:brightness-110 transition-all">تسجيل الدخول</button>
            </form>

            <div class="mt-12 text-center text-sm text-slate-400">
                حسابات تجريبية: <span class="font-mono">مدير / استاذ1 / طالب1 / وكيل1</span> • كلمة المرور: 123
            </div>
        </div>
    </div>

    <!-- المنصة الرئيسية -->
    <div id="main-app" class="hidden flex h-screen overflow-hidden">

        <!-- Sidebar ضخم ومتكامل -->
        <div class="w-72 glass border-l border-white/10 flex flex-col h-full">
            <div class="p-6 flex items-center gap-4 border-b border-white/10">
                <div class="text-4xl">🏛️</div>
                <div class="font-black text-3xl tracking-tighter">سمارت إيرا</div>
            </div>

            <div id="sidebar-user" class="p-6 flex items-center gap-4 border-b border-white/10"></div>

            <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 space-y-1 text-lg"></nav>

            <div class="p-6 border-t border-white/10 text-xs text-slate-400 flex justify-between">
                <span>v5.0 • Classera Style</span>
                <button onclick="logout()" class="hover:text-red-400">خروج</button>
            </div>
        </div>

        <!-- المحتوى الرئيسي -->
        <div class="flex-1 flex flex-col">
            <!-- Top Navbar -->
            <div class="h-16 glass border-b flex items-center px-8 justify-between">
                <div class="flex items-center gap-6">
                    <button onclick="toggleSidebar()" class="text-3xl"><i class="fa-solid fa-bars"></i></button>
                    <h1 id="current-page-title" class="text-3xl font-bold"></h1>
                </div>
                <div class="flex items-center gap-8">
                    <div onclick="openAIAssistant()" class="cursor-pointer flex items-center gap-2 bg-white/10 px-6 py-3 rounded-3xl text-sm font-medium">
                        <i class="fa-solid fa-robot"></i> مساعد ذكي (X.Sera)
                    </div>
                    <div onclick="showNotifications()" class="relative cursor-pointer text-2xl">
                        <i class="fa-solid fa-bell"></i>
                        <span id="notif-badge" class="absolute -top-1 -right-1 bg-red-500 w-5 h-5 rounded-full text-xs flex items-center justify-center">9</span>
                    </div>
                    <div onclick="showProfile()" class="flex items-center gap-3 cursor-pointer">
                        <div id="top-avatar" class="w-10 h-10 rounded-2xl text-3xl flex items-center justify-center bg-gradient-to-br from-purple-500 to-pink-500"></div>
                        <div id="top-user-info"></div>
                    </div>
                </div>
            </div>

            <div id="main-content-area" class="flex-1 overflow-auto p-10"></div>
        </div>
    </div>

    <!-- Modal كبير ومتعدد الاستخدامات -->
    <div id="global-modal" onclick="if(event.target.id==='global-modal') hideModal()" class="hidden fixed inset-0 bg-black/80 backdrop-blur-2xl z-[9999] flex items-center justify-center">
        <div id="modal-content" onclick="event.stopImmediatePropagation()" class="modal-pop glass w-full max-w-5xl max-h-[92vh] rounded-3xl overflow-hidden"></div>
    </div>

    <script>
        // ==================== بيانات المنصة الضخمة ====================
        let currentUser = null
        let users = []
        let assignments = []
        let submissions = {}
        let grades = {}
        let timetable = []
        let teachers = []
        let messages = []
        let meetings = []
        let announcements = []

        function initializePlatform() {
            // مستخدمين
            if (!localStorage.getItem('smartera_users')) {
                users = [
                    {id:1, username:"مدير", password:"123", role:"principal", name:"أحمد المدير", avatar:"👑", email:"admin@smartera.sa"},
                    {id:2, username:"استاذ1", password:"123", role:"teacher", name:"د. محمد الفهد", avatar:"👨‍🏫", email:"teacher1@smartera.sa"},
                    {id:3, username:"طالب1", password:"123", role:"student", name:"علي الشمري", avatar:"🎓", points:850, completed:[]},
                    {id:4, username:"وكيل1", password:"123", role:"guardian", name:"أم خالد", avatar:"👪", childId:3}
                ]
                localStorage.setItem('smartera_users', JSON.stringify(users))
            } else users = JSON.parse(localStorage.getItem('smartera_users'))

            // واجبات + تقديمات
            if (!localStorage.getItem('smartera_assignments')) {
                assignments = [
                    {id:201, title:"تمارين الجبر الخطي", subject:"رياضيات", desc:"احل المسائل مباشرة داخل المنصة", due:"2026-04-28", points:45, postedBy:"استاذ1"},
                    {id:202, title:"مشروع الطاقة الشمسية", subject:"علوم", desc:"اكتب التقرير + ارفع صور", due:"2026-04-30", points:60, postedBy:"استاذ1"},
                    {id:203, title:"تحليل نص أدبي", subject:"لغة عربية", desc:"اكتب التحليل كاملاً", due:"2026-04-25", points:35, postedBy:"استاذ1"}
                ]
                localStorage.setItem('smartera_assignments', JSON.stringify(assignments))
            } else assignments = JSON.parse(localStorage.getItem('smartera_assignments'))

            submissions = JSON.parse(localStorage.getItem('smartera_submissions') || '{}')
            grades = JSON.parse(localStorage.getItem('smartera_grades') || '{}')

            // جدول دراسي
            timetable = JSON.parse(localStorage.getItem('smartera_timetable') || '[]')
            if (timetable.length === 0) {
                timetable = [
                    {day:"الأحد", time:"08:00-09:00", subject:"رياضيات", teacher:"استاذ1"},
                    {day:"الأحد", time:"09:30-10:30", subject:"علوم", teacher:"استاذ1"},
                    {day:"الاثنين", time:"08:00-09:00", subject:"عربي", teacher:"استاذ1"},
                ]
                localStorage.setItem('smartera_timetable', JSON.stringify(timetable))
            }

            teachers = users.filter(u => u.role === "teacher")
            announcements = [{title:"اختبار نهائي الأسبوع القادم", date:"اليوم"}, {title:"يوم مفتوح لأولياء الأمور", date:"غداً"}]

            meetings = JSON.parse(localStorage.getItem('smartera_meetings') || '[]')
            if (meetings.length === 0) {
                meetings = [{id:1, title:"اجتماع هيئة التدريس", time:"اليوم 11:00 صباحاً", type:"video"}]
            }
        }

        function savePlatformData() {
            localStorage.setItem('smartera_users', JSON.stringify(users))
            localStorage.setItem('smartera_assignments', JSON.stringify(assignments))
            localStorage.setItem('smartera_submissions', JSON.stringify(submissions))
            localStorage.setItem('smartera_grades', JSON.stringify(grades))
            localStorage.setItem('smartera_timetable', JSON.stringify(timetable))
            localStorage.setItem('smartera_meetings', JSON.stringify(meetings))
        }

        // ==================== تسجيل الدخول ====================
        function handleLogin(e) {
            e.preventDefault()
            const username = document.getElementById('username').value.trim()
            const password = document.getElementById('password').value
            const found = users.find(u => u.username === username && u.password === password)
            if (found) {
                currentUser = found
                localStorage.setItem('smartera_current', JSON.stringify(currentUser))
                document.getElementById('login-screen').classList.add('hidden')
                document.getElementById('main-app').classList.remove('hidden')
                renderSmartEraDashboard()
            } else {
                alert("❌ بيانات الدخول غير صحيحة")
            }
        }

        // ==================== بناء الداشبورد الضخم ====================
        function renderSmartEraDashboard() {
            // Sidebar User
            document.getElementById('sidebar-user').innerHTML = `
                <div class="text-5xl">${currentUser.avatar}</div>
                <div class="flex-1 min-w-0">
                    <div class="font-bold text-xl truncate">${currentUser.name}</div>
                    <div class="text-cyan-300 text-sm">${currentUser.role === 'student' ? currentUser.points + ' نقطة' : currentUser.role}</div>
                </div>
            `

            // Top user
            document.getElementById('top-avatar').innerHTML = currentUser.avatar
            document.getElementById('top-user-info').innerHTML = `
                <div class="font-semibold">${currentUser.name}</div>
                <div class="text-xs text-slate-400">${currentUser.role}</div>
            `

            // Sidebar Navigation - مستوحى من Classera (كثير أقسام)
            let navHTML = `
                <a onclick="navigateTo('dashboard')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer nav-active"><i class="fa-solid fa-house w-6"></i> لوحة التحكم</a>
                <a onclick="navigateTo('courses')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-book w-6"></i> المواد والدروس</a>
                <a onclick="navigateTo('assignments')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-tasks w-6"></i> الواجبات</a>
                <a onclick="navigateTo('exams')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-file-lines w-6"></i> الاختبارات</a>
                <a onclick="navigateTo('grades')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-chart-pie w-6"></i> الدرجات</a>
                <a onclick="navigateTo('timetable')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-calendar-days w-6"></i> الجدول الدراسي</a>
                <a onclick="navigateTo('communication')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-comments w-6"></i> التواصل والدردشة</a>
                <a onclick="navigateTo('meetings')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-video w-6"></i> الاجتماعات الافتراضية</a>
                <a onclick="navigateTo('attendance')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-user-check w-6"></i> الحضور</a>
            `

            if (currentUser.role === 'guardian') navHTML += `<a onclick="navigateTo('parent-portal')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-user-shield w-6"></i> بوابة ولي الأمر</a>`
            if (currentUser.role === 'teacher' || currentUser.role === 'principal') navHTML += `<a onclick="navigateTo('teacher-tools')" class="nav-link flex items-center gap-4 px-6 py-5 rounded-3xl cursor-pointer"><i class="fa-solid fa-chalkboard-user w-6"></i> أدوات المعلم</a>`

            document.getElementById('sidebar-nav').innerHTML = navHTML

            navigateTo('dashboard')
        }

        function navigateTo(section) {
            document.querySelectorAll('#sidebar-nav a').forEach(a => a.classList.remove('nav-active'))
            const activeLink = Array.from(document.querySelectorAll('#sidebar-nav a')).find(a => a.getAttribute('onclick').includes(`'${section}'`))
            if (activeLink) activeLink.classList.add('nav-active')

            document.getElementById('current-page-title').textContent = getSectionTitle(section)
            const contentArea = document.getElementById('main-content-area')

            if (section === 'dashboard') {
                contentArea.innerHTML = `
                <div class="max-w-7xl mx-auto">
                    <div class="flex items-end justify-between mb-12">
                        <div>
                            <h1 class="text-6xl font-black">مرحباً بعودتك، ${currentUser.name.split(' ')[0]} 👋</h1>
                            <p class="text-2xl text-slate-400 mt-3">ما الذي سنحققه اليوم في سمارت إيرا؟</p>
                        </div>
                        <div class="text-right">
                            <div class="text-emerald-400 text-sm">اليوم • ${new Date().toLocaleDateString('ar-SA')}</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        <div class="glass rounded-3xl p-8 card-hover">
                            <div class="text-6xl mb-6">📚</div>
                            <div class="text-5xl font-bold">${assignments.length}</div>
                            <div class="text-slate-300">واجب نشط</div>
                        </div>
                        <div class="glass rounded-3xl p-8 card-hover">
                            <div class="text-6xl mb-6">📊</div>
                            <div class="text-5xl font-bold text-emerald-400">${currentUser.role === 'student' ? '92' : '—'}</div>
                            <div class="text-slate-300">متوسط الدرجات</div>
                        </div>
                        <div class="glass rounded-3xl p-8 card-hover">
                            <div class="text-6xl mb-6">🗓️</div>
                            <div class="text-5xl font-bold">${timetable.length}</div>
                            <div class="text-slate-300">حصة هذا الأسبوع</div>
                        </div>
                        <div class="glass rounded-3xl p-8 card-hover">
                            <div class="text-6xl mb-6">👥</div>
                            <div class="text-5xl font-bold">${teachers.length}</div>
                            <div class="text-slate-300">معلم</div>
                        </div>
                    </div>

                    <div class="mt-16">
                        <h2 class="text-3xl font-bold mb-6">الإعلانات الأخيرة</h2>
                        <div class="space-y-4">
                            ${announcements.map(a => `<div class="glass p-6 rounded-3xl flex justify-between"><div>${a.title}</div><div class="text-xs text-slate-400">${a.date}</div></div>`).join('')}
                        </div>
                    </div>
                </div>`
            }

            else if (section === 'assignments') {
                let html = `<div class="max-w-6xl mx-auto"><h2 class="text-4xl font-bold mb-10">الواجبات والمهام</h2><div class="grid grid-cols-1 lg:grid-cols-2 gap-8">`
                assignments.forEach(ass => {
                    const isDone = submissions[ass.id] && submissions[ass.id].some(s => s.studentId === currentUser.id)
                    html += `
                    <div onclick="openAssignmentModal(${ass.id})" class="glass rounded-3xl p-10 card-hover cursor-pointer">
                        <div class="flex justify-between items-start">
                            <div><span class="px-4 py-1 bg-cyan-500/20 text-cyan-300 text-xs rounded-3xl">${ass.subject}</span></div>
                            <div class="text-right"><div class="text-emerald-400 text-4xl font-bold">${ass.points}</div><div class="text-xs">نقطة</div></div>
                        </div>
                        <h3 class="font-bold text-3xl mt-8">${ass.title}</h3>
                        <p class="mt-4 text-slate-300 line-clamp-2">${ass.desc}</p>
                        <div class="mt-10 text-sm text-slate-400">تاريخ التسليم: ${ass.due}</div>
                        ${isDone ? `<div class="mt-6 inline-flex items-center gap-3 bg-emerald-500/20 text-emerald-400 px-6 py-3 rounded-3xl"><i class="fa-solid fa-check-circle"></i> تم التسليم</div>` : ''}
                    </div>`
                })
                html += `</div></div>`
                contentArea.innerHTML = html
            }

            else if (section === 'grades') {
                contentArea.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <h2 class="text-4xl font-bold mb-10">الدرجات والتقارير</h2>
                    <div class="glass rounded-3xl p-10">
                        <table class="w-full">
                            <thead><tr class="border-b border-white/10"><th class="py-6 text-start">المادة</th><th class="py-6 text-start">الدرجة</th><th class="py-6 text-start">التقييم</th></tr></thead>
                            <tbody id="grades-table-body"></tbody>
                        </table>
                    </div>
                </div>`
                renderGradesTable()
            }

            else if (section === 'timetable') {
                contentArea.innerHTML = `<div class="max-w-7xl mx-auto"><h2 class="text-4xl font-bold mb-10">الجدول الدراسي الأسبوعي</h2><div class="grid grid-cols-7 gap-6">${renderTimetableGrid()}</div></div>`
            }

            else if (section === 'communication') {
                contentArea.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <h2 class="text-4xl font-bold mb-10">التواصل والدردشة</h2>
                    <div class="glass rounded-3xl p-8">
                        <button onclick="openChatModal()" class="w-full py-8 bg-gradient-to-r from-purple-500 to-pink-500 rounded-3xl text-2xl font-medium">فتح غرفة الدردشة مع المعلمين</button>
                    </div>
                </div>`
            }

            else if (section === 'meetings') {
                contentArea.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <h2 class="text-4xl font-bold mb-10">الاجتماعات الافتراضية</h2>
                    ${meetings.map(m => `
                    <div onclick="joinVirtualMeeting(${m.id})" class="glass rounded-3xl p-8 mb-6 flex justify-between items-center cursor-pointer card-hover">
                        <div>
                            <div class="font-bold text-2xl">${m.title}</div>
                            <div class="text-slate-400">${m.time}</div>
                        </div>
                        <div class="px-10 py-6 bg-emerald-500 rounded-3xl">انضم الآن</div>
                    </div>`).join('')}
                </div>`
            }

            else if (section === 'attendance' && currentUser.role !== 'student') {
                contentArea.innerHTML = `<div class="max-w-3xl mx-auto glass rounded-3xl p-12 text-center"><div class="text-7xl mb-8">📍</div><h3 class="text-4xl font-bold">تسجيل الحضور</h3><p class="mt-6 text-slate-300">ميزة متقدمة • جاهزة للتوسع</p></div>`
            }

            // يمكن إضافة المزيد من الأقسام بسهولة
        }

        function getSectionTitle(section) {
            const titles = {
                dashboard: "لوحة التحكم الذكية",
                courses: "المواد الدراسية",
                assignments: "الواجبات",
                exams: "الاختبارات",
                grades: "الدرجات والتقييم",
                timetable: "الجدول الدراسي",
                communication: "التواصل",
                meetings: "الاجتماعات",
                attendance: "الحضور والغياب",
                'parent-portal': "بوابة ولي الأمر",
                'teacher-tools': "أدوات المعلم"
            }
            return titles[section] || "سمارت إيرا"
        }

        function renderTimetableGrid() {
            let html = ''
            const days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس"]
            days.forEach(day => {
                html += `<div class="glass rounded-3xl p-6"><div class="font-bold text-center mb-6">${day}</div>`
                const daySlots = timetable.filter(t => t.day === day)
                daySlots.forEach(slot => {
                    html += `<div class="bg-white/10 rounded-2xl p-5 mb-4"><div class="text-cyan-300">${slot.time}</div><div class="font-medium">${slot.subject}</div><div class="text-xs text-slate-400">${slot.teacher}</div></div>`
                })
                html += `</div>`
            })
            return html
        }

        function renderGradesTable() {
            const tbody = document.getElementById('grades-table-body')
            if (!tbody) return
            let rows = ''
            if (currentUser.role === 'student') {
                const myGrades = grades[currentUser.id] || []
                myGrades.forEach(g => {
                    rows += `<tr class="border-b border-white/10"><td class="py-7">${g.subject}</td><td class="py-7 font-bold text-emerald-400">${g.grade}</td><td class="py-7">${g.comment}</td></tr>`
                })
            }
            tbody.innerHTML = rows || `<tr><td colspan="3" class="py-12 text-center text-slate-400">لا توجد درجات بعد</td></tr>`
        }

        // ==================== فتح واجب ====================
        window.openAssignmentModal = function(id) {
            const ass = assignments.find(a => a.id === id)
            if (!ass) return

            const html = `
            <div class="p-12">
                <h2 class="text-4xl font-bold">${ass.title}</h2>
                <div class="flex gap-8 mt-8">
                    <div class="flex-1">
                        <p class="text-slate-300">${ass.desc}</p>
                        <textarea id="answer-field" class="mt-12 w-full h-64 glass border border-white/30 rounded-3xl p-8" placeholder="اكتب إجابتك هنا..."></textarea>
                        <button onclick="submitAssignmentAnswer(${id})" class="mt-8 w-full py-7 bg-gradient-to-r from-emerald-500 to-cyan-400 rounded-3xl text-2xl font-bold">تسليم الإجابة</button>
                    </div>
                    <div class="w-80 bg-white/5 rounded-3xl p-8 text-sm">
                        <div class="font-medium mb-4">تفاصيل الواجب</div>
                        <div>المادة: ${ass.subject}</div>
                        <div>النقاط: ${ass.points}</div>
                        <div>آخر موعد: ${ass.due}</div>
                    </div>
                </div>
            </div>`
            showModal(html)
        }

        window.submitAssignmentAnswer = function(id) {
            const answer = document.getElementById('answer-field').value
            if (!answer) return alert("اكتب إجابة قبل التسليم")
            if (!submissions[id]) submissions[id] = []
            submissions[id].push({studentId: currentUser.id, answer: answer, date: new Date().toLocaleString()})
            savePlatformData()
            hideModal()
            alert("✅ تم تسليم الواجب بنجاح!")
            navigateTo('assignments')
        }

        // ==================== AI Assistant (مستوحى من X.Sera) ====================
        function openAIAssistant() {
            const html = `
            <div class="p-12">
                <div class="flex items-center gap-4 mb-8">
                    <div class="text-5xl">🤖</div>
                    <div>
                        <h3 class="text-3xl font-bold">X.Sera - المساعد الذكي</h3>
                        <p class="text-slate-400">اسأل أي شيء تعليمي</p>
                    </div>
                </div>
                <div class="bg-white/10 rounded-3xl p-8 min-h-[300px] mb-8" id="ai-chat-area">مرحباً! كيف يمكنني مساعدتك اليوم؟</div>
                <div class="flex gap-4">
                    <input id="ai-question" class="flex-1 glass rounded-3xl py-7 px-8" placeholder="مثال: شرح قانون نيوتن...">
                    <button onclick="simulateAIResponse()" class="px-12 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-3xl">إرسال</button>
                </div>
            </div>`
            showModal(html)
        }

        window.simulateAIResponse = function() {
            const area = document.getElementById('ai-chat-area')
            area.innerHTML += `<div class="mt-6 bg-white/10 p-6 rounded-3xl">هذا رد افتراضي من المساعد الذكي. في النسخ الحقيقية يمكن دمج API للـ AI.</div>`
        }

        // ==================== اجتماع افتراضي ====================
        window.joinVirtualMeeting = function(id) {
            hideModal()
            showModal(`
            <div class="p-20 text-center">
                <div class="mx-auto w-64 h-64 bg-gradient-to-br from-blue-600 to-cyan-400 rounded-full flex items-center justify-center text-8xl mb-12">📹</div>
                <h2 class="text-5xl font-bold mb-4">غرفة الاجتماع مفتوحة</h2>
                <p class="text-2xl text-slate-300">عدد المشاركين: 12</p>
                <button onclick="hideModal()" class="mt-20 px-20 py-7 bg-red-500 rounded-3xl text-2xl">مغادرة الاجتماع</button>
            </div>`)
        }

        // ==================== دردشة ====================
        function openChatModal() {
            showModal(`
            <div class="flex flex-col h-[75vh]">
                <div class="p-6 border-b flex items-center justify-between bg-white/10">
                    <div class="flex items-center gap-4"><span class="text-4xl">👨‍🏫</span><div class="font-bold">د. محمد الفهد</div></div>
                    <button onclick="hideModal()" class="text-3xl">✕</button>
                </div>
                <div class="flex-1 p-8 overflow-auto" id="chat-messages">مرحباً! كيف حالك اليوم؟</div>
                <div class="p-6 border-t flex gap-4 bg-white/5">
                    <input id="chat-msg-input" class="flex-1 glass rounded-3xl py-7 px-8" placeholder="اكتب رسالة...">
                    <button onclick="sendChatMessage()" class="px-12 bg-blue-600 rounded-3xl">إرسال</button>
                </div>
            </div>`)
        }

        window.sendChatMessage = function() {
            const input = document.getElementById('chat-msg-input')
            if (!input.value) return
            const messagesDiv = document.getElementById('chat-messages')
            messagesDiv.innerHTML += `<div class="bg-white/10 p-5 rounded-3xl mt-4 max-w-[80%] ml-auto">${input.value}</div>`
            input.value = ''
            messagesDiv.scrollTop = messagesDiv.scrollHeight
        }

        // ==================== Modal Helpers ====================
        function showModal(innerHTML) {
            const modal = document.getElementById('global-modal')
            document.getElementById('modal-content').innerHTML = innerHTML
            modal.classList.remove('hidden')
            modal.classList.add('flex')
        }

        function hideModal() {
            const modal = document.getElementById('global-modal')
            modal.classList.add('hidden')
            modal.classList.remove('flex')
        }

        function showNotifications() {
            showModal(`<div class="p-12"><h2 class="text-4xl font-bold mb-10">الإشعارات والتنبيهات</h2><div class="space-y-8 text-lg">• تم تقييم واجبك في الرياضيات<br>• اجتماع هيئة التدريس غداً<br>• إعلان جديد من الإدارة</div></div>`)
        }

        function showProfile() {
            showModal(`
            <div class="p-16 text-center">
                <div class="text-8xl mx-auto mb-8">${currentUser.avatar}</div>
                <h2 class="text-5xl font-bold">${currentUser.name}</h2>
                <p class="text-2xl text-cyan-300 mt-3">${currentUser.role}</p>
                <button onclick="hideModal()" class="mt-16 px-16 py-7 border border-white/30 rounded-3xl text-xl">إغلاق</button>
            </div>`)
        }

        function toggleSidebar() {
            // يمكن إضافة انيميشن لإخفاء الـ sidebar في المستقبل
            alert("Sidebar toggle (يمكن تطويره أكثر)")
        }

        function logout() {
            if (confirm("هل تريد تسجيل الخروج؟")) {
                localStorage.removeItem('smartera_current')
                location.reload()
            }
        }

        // ==================== تشغيل المنصة ====================
        window.onload = () => {
            initializePlatform()

            const savedUser = localStorage.getItem('smartera_current')
            if (savedUser) {
                currentUser = JSON.parse(savedUser)
                document.getElementById('login-screen').classList.add('hidden')
                document.getElementById('main-app').classList.remove('hidden')
                renderSmartEraDashboard()
            }

            document.getElementById('login-form').addEventListener('submit', handleLogin)

            console.log('%c🚀 سمارت إيرا v5.0 • منصة ضخمة تشبه Classera جاهزة!', 'color:#67e8f9; font-size:18px; font-weight:bold')
        }
    </script>
</body>
</html>
