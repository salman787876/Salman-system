<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartPOS Pro</title>

<style>
*{
  margin:0;
  padding:0;
  font-family:system-ui;
  box-sizing:border-box;
}

body{
  background:#0f0f10;
  color:white;
}

/* HEADER */
header{
  background:#151517;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid #ff7a00;
}

header h1{
  font-size:18px;
  color:#ff7a00;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:2.5fr 1fr;
  gap:15px;
  padding:15px;
}

/* PRODUCTS GRID */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

/* CARD */
.card{
  background:#1a1a1d;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.4);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{
  padding:10px;
}

.name{
  font-weight:bold;
}

.price{
  color:#ff7a00;
  margin-top:5px;
  font-weight:bold;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.add{
  background:#ff7a00;
  color:black;
}

.add:hover{
  background:#ff8c1a;
}

/* CART */
.cart{
  background:#1a1a1d;
  padding:15px;
  border-radius:16px;
  height:fit-content;
  position:sticky;
  top:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #333;
}

.total{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
  color:#ff7a00;
}

/* ADMIN */
.admin{
  margin:15px;
  background:#1a1a1d;
  padding:15px;
  border-radius:16px;
  border:1px solid #333;
}

input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  width:200px;
}
</style>
</head>

<body>

<header>
<h1>🏪 SmartPOS Pro</h1>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cart"></div>

<div class="total">Total: <span id="total">0</span> SAR</div>

<button class="add" onclick="checkout()">Checkout</button>
</div>

</div>

<!-- ADMIN -->
<div class="admin">
<h3>➕ Add Product</h3>

<input id="name" placeholder="Product name">
<input id="price" type="number" placeholder="Price">
<input id="img" placeholder="Image URL">

<button class="add" onclick="addProduct()">Add Product</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {
    name:"Milk",
    price:5,
    img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=500"
  },
  {
    name:"Bread",
    price:3,
    img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec?w=500"
  },
  {
    name:"Eggs",
    price:12,
    img:"https://images.unsplash.com/photo-1506976785307-8732e854ad03?w=500"
  },
  {
    name:"Rice",
    price:20,
    img:"https://images.unsplash.com/photo-1586201375761-83865001e31c?w=500"
  },
  {
    name:"Apple",
    price:8,
    img:"https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=500"
  },
  {
    name:"Juice",
    price:6,
    img:"https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=500"
  }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* SAVE */
function save(){
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* PRODUCTS */
function render(){
  let div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-body">
          <div class="name">${p.name}</div>
          <div class="price">${p.price} SAR</div>
          <button class="add" onclick="add(${i})">Add to Cart</button>
        </div>
      </div>
    `;
  });

  renderCart();
}

/* ADD */
function add(i){
  cart.push(products[i]);
  save();
  renderCart();
}

/* CART */
function renderCart(){
  let div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach((c)=>{
    total += c.price;

    div.innerHTML += `
      <div class="item">
        <span>${c.name}</span>
        <span>${c.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* CHECKOUT */
function checkout(){
  alert("Payment Done 💰 Total: " + document.getElementById("total").innerText);
  cart = [];
  save();
  renderCart();
}

/* ADD PRODUCT */
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let img = document.getElementById("img").value;

  if(!name || !price || !img) return;

  products.push({
    name,
    price:Number(price),
    img
  });

  save();
  render();
}

render();

</script>

</body>
</html>
