<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartPOS Ultra</title>

<style>
*{
  margin:0;
  padding:0;
  font-family:system-ui;
  box-sizing:border-box;
}

body{
  background:#f2f4f8;
  color:#111;
}

/* HEADER */
header{
  background:white;
  padding:18px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #e6eaf0;
}

header h1{
  font-size:18px;
  font-weight:700;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:3fr 1fr;
  gap:20px;
  padding:20px;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

/* CARD (IMPORTANT PART 🔥) */
.card{
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.06);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 30px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-body{
  padding:12px;
}

.name{
  font-weight:600;
  margin-bottom:5px;
}

.price{
  color:#2563eb;
  font-weight:700;
  margin-bottom:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  background:#2563eb;
  color:white;
}

button:hover{
  background:#1d4ed8;
}

/* CART */
.cart{
  background:white;
  border-radius:16px;
  padding:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  height:fit-content;
  position:sticky;
  top:20px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

.total{
  margin-top:12px;
  font-size:18px;
  font-weight:700;
  color:#2563eb;
}
</style>
</head>

<body>

<header>
<h1>🏪 SmartPOS Ultra System</h1>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cart"></div>
<div class="total">Total: <span id="total">0</span> SAR</div>
<button onclick="checkout()">Checkout</button>
</div>

</div>

<script>

let products = [
  {name:"Milk", price:5, img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=500"},
  {name:"Bread", price:3, img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec?w=500"},
  {name:"Eggs", price:12, img:"https://images.unsplash.com/photo-1506976785307-8732e854ad03?w=500"},
  {name:"Rice", price:20, img:"https://images.unsplash.com/photo-1586201375761-83865001e31c?w=500"},
  {name:"Apple", price:8, img:"https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?w=500"},
  {name:"Juice", price:6, img:"https://images.unsplash.com/photo-1600271886742-f049cd451bba?w=500"}
];

let cart = [];

function render(){
  let div = document.getElementById("products");
  div.innerHTML = "";

  products.forEach((p,i)=>{
    div.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-body">
          <div class="name">${p.name}</div>
          <div class="price">${p.price} SAR</div>
          <button onclick="add(${i})">Add to Cart</button>
        </div>
      </div>
    `;
  });

  renderCart();
}

function add(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  let div = document.getElementById("cart");
  div.innerHTML = "";

  let total = 0;

  cart.forEach(c=>{
    total += c.price;
    div.innerHTML += `
      <div class="item">
        <span>${c.name}</span>
        <span>${c.price}</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function checkout(){
  alert("Paid 💰 Total: " + document.getElementById("total").innerText);
  cart = [];
  renderCart();
}

render();

</script>

</body>
</html>
